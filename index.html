<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="game-over" style="visibility: hidden;">
        <h2 class="">Game Over!</h2>
    </div>
    <div class="container">
        <div class="header">
            <label for="level">Select Difficulty:</label>
            <select name="level" id="level">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="unbeatable">Unbeatable</option>
            </select>
        </div>

        <div class="players">
            <label for="player1">Player 1</label>
            <input id="player1" type="text" placeholder="Enter your name">

            <h2>VS</h2>

            <input id="player2" type="text" placeholder="Enter your name">
            <label for="player2">Player 2</label>
        </div>

        <div class="start">
            <button id="start-btn" onclick="StartGame()">Start</button>
        </div>

        <div class="letter">
            <button>X</button>
            <button>O</button>
        </div>

        <div class="board">
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
            <div class="board-items">
                <button class="board-item"></button>
            </div>
        </div>

        <div class="footer">
            <button>Restart</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
